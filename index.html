<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Respace — Luxury Home Organization</title>
    <meta name="description" content="Luxury home and lifestyle organization designed to bring clarity, calm, and elevated flow into your everyday living." />
    <meta name="theme-color" content="#4A5E4A" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Netlify Forms detection — must be static HTML, never rendered -->
    <form name="respace-contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="respace-contact" />
      <input type="hidden" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="service">
        <option>Home Reset</option>
        <option>Closet Curation</option>
        <option>Move &amp; Transition</option>
        <option>Office &amp; Workspace</option>
        <option>Lifestyle Reset</option>
        <option>Maintenance Plan</option>
        <option>Not Sure Yet</option>
      </select>
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
